name: MediaStreamDemo
options:
  bundleIdPrefix: com.blaineam.mediastreamdemo
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  MediaStream:
    path: ..

settings:
  base:
    SWIFT_VERSION: "5.0"
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"
    DEVELOPMENT_TEAM: ""
    GENERATE_INFOPLIST_FILE: "YES"

targets:
  MediaStreamDemo:
    type: application
    platform: iOS
    sources:
      - MediaStreamDemo
    dependencies:
      - package: MediaStream
        product: MediaStream
    info:
      path: MediaStreamDemo/Info.generated.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blaineam.mediastreamdemo
        TARGETED_DEVICE_FAMILY: "1,2"

  MediaStreamDemoUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - MediaStreamDemoUITests
    dependencies:
      - target: MediaStreamDemo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.blaineam.mediastreamdemo.uitests
        TEST_TARGET_NAME: MediaStreamDemo

schemes:
  MediaStreamDemo:
    build:
      targets:
        MediaStreamDemo: all
        MediaStreamDemoUITests: [test]
    test:
      targets:
        - MediaStreamDemoUITests
      gatherCoverageData: false
